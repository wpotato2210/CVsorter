name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  packaging:
    name: Packaging Integrity (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ['3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project (editable)
        run: python -m pip install -e .

      - name: Validate package import integrity
        run: python -c "import coloursorter"

      - name: Protocol static guard (authority + contract parity)
        run: python tools/protocol_static_guard.py

      - name: Dependency declaration guard
        run: python scripts/sync_requirements.py --check

      - name: Firmware readiness strict checks
        run: python tools/firmware_readiness_check.py --strict

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ['3.12']

    env:
      PYTHONHASHSEED: '0'
      PIP_DISABLE_PIP_VERSION_CHECK: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project + test dependencies (editable)
        run: python -m pip install -e .[test]

      - name: Run pytest suite
        run: PYTHONPATH=src python -m pytest tests -q

      - name: Upload coverage artifact
        if: ${{ always() && hashFiles('coverage.xml') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  gui-transition-gate:
    name: GUI Transition Gate (PySide6, Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ['3.12']

    env:
      QT_QPA_PLATFORM: 'offscreen'
      PYTHONHASHSEED: '0'
      PIP_DISABLE_PIP_VERSION_CHECK: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project + test dependencies (editable)
        run: python -m pip install -e .[test]

      - name: Verify PySide6 availability
        run: python -c "import PySide6; print(PySide6.__version__)"

      - name: Run GUI replay→live illegal transition invariants
        run: PYTHONPATH=src python -m pytest -q -m gui_transition_gate tests/test_bench_controller.py tests/test_bench_controller_gui.py
