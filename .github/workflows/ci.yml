name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-runtime:
    name: Validate runtime dependencies (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip

          if python -m pip install -e '.[test]'; then
            echo "Installed project with [test] extras"
          else
            echo "No [test] extras found; installing base project"
            python -m pip install -e .
          fi

          if ! python -m pip show pytest >/dev/null 2>&1; then
            echo "pytest not provided by project dependencies; installing pytest"
            python -m pip install pytest
          fi

      - name: Validate PySide6 runtime modules
        run: python tools/validate_pyside6_modules.py --spec docs/openspec/v3/gui/pyside6_runtime_modules.yaml

      - name: Run unit tests
        run: pytest
