name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-runtime:
    name: Validate runtime dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project
        run: pip install -e .

      - name: Validate PySide6 runtime modules
        run: python tools/validate_pyside6_modules.py --spec docs/openspec/v3/gui/pyside6_runtime_modules.yaml

      - name: Run unit tests
        run: pytest
