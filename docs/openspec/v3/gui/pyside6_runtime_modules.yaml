# OpenSpec v3: PySide6 runtime module validation contract
# Schema notes:
# - runtime.required_modules: mandatory Python dotted import paths (CI must fail if missing).
# - runtime.optional_modules: dotted import paths checked when present in the installed Qt build.
# - runtime.version_window: supported dependency range for PySide6 and PySide6-Addons alignment.
# - components.*.owners: optional ownership map for maintainers and dependency tracing.
schema_version: 3
runtime:
  package: PySide6
  version_window:
    min_inclusive: "6.6.0"
    max_exclusive: "7.0.0"
  required_modules:
    - PySide6.QtCore
    - PySide6.QtGui
    - PySide6.QtWidgets
    - PySide6.QtStateMachine
  optional_modules:
    - PySide6.Qt3DCore

components:
  bench_main_window:
    owners:
      - gui/bench_app/app.py
    required_modules:
      - PySide6.QtWidgets
      - PySide6.QtGui
      - PySide6.QtCore
  bench_controller_state_machine:
    owners:
      - gui/bench_app/controller.py
    required_modules:
      - PySide6.QtStateMachine
      - PySide6.QtCore
  runtime_3d_extension:
    owners:
      - gui/bench_app/app.py
    optional_modules:
      - PySide6.Qt3DCore
